<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music Player</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.3/howler.min.js"></script>
</head>
<body>
  <!-- Particles in the background -->
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>

  <div class="header">
    <div class="logo-container">
      <div class="logo">Music App</div>
    </div>
    <div class="search-bar">
  <input type="text" placeholder="Search for a song..." id="search-input">
  <button class="search-clear" id="clear-btn" style="display: none;">&#10006;</button>
</div>

    <div class="sort-dropdown">
      <label for="sort"> </label>
      <select id="sort" onchange="sortSongs()">
        <option value="alphabetical">Alphabetical</option>
        <option value="most-liked">Most Liked</option>
        <option value="most-recent">Most Recent</option>
      </select>
    </div>
  </div>

  <div class="song-list">
    <!-- Songs will be generated dynamically -->
  </div>

  <script src="script.js"></script>
</body>
</html>
